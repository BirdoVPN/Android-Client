name: BirdoVPN
options:
  bundleIdPrefix: app.birdo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"

# WireGuardKit ships the Go tunnel runtime + WireGuardAdapter used by both
# the host app (for type-safe TunnelConfiguration) and the PacketTunnel
# extension (to actually carry packets).
packages:
  WireGuardKit:
    url: https://git.zx2c4.com/wireguard-apple
    branch: master

targets:
  BirdoVPN:
    type: application
    platform: iOS
    sources:
      - path: iosApp
        excludes:
          - Info.plist
    info:
      path: iosApp/Info.plist
    entitlements:
      path: iosApp/BirdoVPN.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.birdo.vpn
        INFOPLIST_FILE: iosApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: iosApp/BirdoVPN.entitlements
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../shared/build/bin/iosSimulatorArm64/debugFramework"
          - "$(SRCROOT)/../shared/build/bin/iosArm64/releaseFramework"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "BirdoShared"
    dependencies:
      - target: PacketTunnel
      - package: WireGuardKit
        product: WireGuardKit

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
        excludes:
          - Info.plist
    info:
      path: PacketTunnel/Info.plist
    entitlements:
      path: PacketTunnel/PacketTunnel.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.birdo.vpn.tunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../shared/build/bin/iosSimulatorArm64/debugFramework"
          - "$(SRCROOT)/../shared/build/bin/iosArm64/releaseFramework"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "BirdoShared"
    dependencies:
      - package: WireGuardKit
        product: WireGuardKit
