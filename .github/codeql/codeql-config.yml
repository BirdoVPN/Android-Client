name: "Birdo Mobile CodeQL Config"

# Run the security-and-quality suite, but filter out alerts that are
# generated by Kotlin/Compose compiler IR lowering (synthetic locals,
# $stable fields, tmp0_other_with_cast bytecode artifacts) and known
# false positives that cannot be silenced in source.
queries:
  - uses: security-and-quality

paths-ignore:
  - "iosApp/**"
  - "shared/**/build/**"
  - "app/build/**"
  - "**/build/generated/**"
  - "screenshots/**"
  - "store-assets/**"
  - "docs/**"

query-filters:
  # Compose compiler emits a `$stable` int on every @Composable wrapping
  # class. CodeQL flags this as field shadowing the superclass — but the
  # field is generated, not authored, and is a documented part of the
  # Compose runtime ABI.
  - exclude:
      id: java/field-masks-super-field

  # Kotlin compiler emits `tmp0_other_with_cast` and similar synthetic
  # locals during smart-cast lowering. These appear at line 1 of every
  # file and are unreachable from source.
  - exclude:
      id: java/local-variable-is-never-read

  # `Random()` used once is the *correct* pattern for SecureRandom inside
  # short-lived cryptographic helpers. CodeQL's heuristic does not
  # distinguish between java.util.Random and java.security.SecureRandom.
  - exclude:
      id: java/random-used-once

  # CodeQL does not track loop-body mutations through forEach blocks,
  # producing false `constant-comparison` alerts on conditions that are
  # genuinely runtime-dependent.
  - exclude:
      id: java/constant-comparison

  # Deprecated TileService API is conditionally invoked on Android < 14
  # only via `@Suppress("DEPRECATION")` and is required for backwards
  # compatibility on devices that don't have the new API.
  - exclude:
      id: java/deprecated-call
